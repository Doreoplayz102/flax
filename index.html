<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flaxerrr | link-in-bio</title>
    <style>
        :root { 
            --bg: #0d0d0d; 
            --card-main: #141414; /* Deep gray for the main container */
            --card-sub: #1a1a1a;  /* Slightly lighter for sub-panels */
            --accent: #3498db; 
            --text-main: #efefef;
            --text-sub: #888;
        }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', -apple-system, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Red Mouse Highlight */
        .cursor-highlight {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.08) 0%, rgba(255, 0, 0, 0) 70%);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 0;
            left: -500px; /* Start off-screen */
        }

        /* Main profile card (the large container) */
        .profile-container { 
            width: 90%; 
            max-width: 500px; 
            z-index: 1; 
            position: relative;
            background: var(--card-main);
            padding: 30px;
            border-radius: 28px;
            border: 1px solid #222;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        /* Top profile section (PFP and Username/Bio) */
        .profile-top { text-align: center; }
        .avatar { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            border: 2px solid var(--accent); 
            margin-bottom: 15px; 
            object-fit: cover;
            background: #222;
        }
        .username { margin: 0; color: var(--accent); font-size: 24px; font-weight: 700; }
        .bio { color: var(--text-sub); margin: 8px 0 0; font-size: 14px; line-height: 1.4; }

        /* Links button section */
        .links { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .btn { 
            background: var(--card-sub); 
            padding: 12px; 
            border-radius: 12px; 
            text-decoration: none; 
            color: #ccc; 
            font-size: 14px; 
            transition: all 0.2s ease;
            border: 1px solid transparent;
            text-align: center;
        }
        .btn:hover { background: #2a2a2a; color: white; border-color: #444; transform: translateY(-2px); }

        /* The Spotify "Now Playing" block */
        .music-panel { 
            background: var(--card-sub); 
            padding: 20px; 
            border-radius: 20px; 
            margin-top: 25px; 
            text-align: left;
            border: 1px solid #222;
        }
        .label { color: var(--text-sub); font-size: 11px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 12px; }
        .track-flex { display: flex; align-items: center; gap: 15px; }
        .track-art { width: 60px; height: 60px; border-radius: 10px; background: #222; background-size: cover; background-position: center; }

        /* Bottom section for top tracks (currently hardcoded to match image) */
        .tracks-list { margin-top: 25px; padding-top: 15px; border-top: 1px solid #222; }
        .track-item { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .list-track-art { width: 40px; height: 40px; border-radius: 6px; }
        .list-track-info { flex-grow: 1; font-size: 13px; }
        .list-track-artist { color: var(--text-sub); font-size: 12px; }
    </style>
</head>
<body>

    <div class="cursor-highlight"></div>

    <div class="profile-container">
        
        <div class="profile-top">
            <img id="discord-pfp" src="https://avatarfiles.alphacoders.com/264/264906.jpg" class="avatar" alt="flaxerrr">
            <h2 id="discord-user" class="username">flaxerrr</h2>
            <p id="discord-bio" class="bio">tiktoker</p>
        </div>

        <div class="links">
            <a href="https://discord.com" class="btn">Discord</a>
            <a href="https://github.com" class="btn">Github</a>
            <a href="https://roblox.com" class="btn">Roblox</a>
            <a href="#" class="btn">Projects</a>
        </div>

        <div class="music-panel">
            <div id="status-label" class="label">now playing</div>
            <div class="track-flex">
                <div class="track-art" id="track-art"></div>
                <div>
                    <div id="track-name" style="font-weight: bold; font-size: 14px;">I <3 Lean</div>
                    <div id="artist-name" style="font-size: 12px; color: var(--text-sub);">ItsCharlie, Dave Blunts</div>
                </div>
            </div>
        </div>

        <div class="tracks-list">
            <div class="label" style="margin-bottom: 15px;">top tracks</div>
            
            <div class="track-item">
                <img src="https://i.scdn.co/image/ab67616d0000b2734e56598586c0c16928e4618e" class="list-track-art">
                <div class="list-track-info">
                    <div>PDF ANONYMOUS</div>
                    <div class="list-track-artist">IN A HORRIBLE WORLD</div>
                </div>
            </div>
            
            <div class="track-item">
                <img src="https://i.scdn.co/image/ab67616d0000b2734e56598586c0c16928e4618e" class="list-track-art">
                <div class="list-track-info">
                    <div>Last Day out the Hospital</div>
                    <div class="list-track-artist">IN A HORRIBLE WORLD</div>
                </div>
            </div>
        </div>
        
    </div>

    <script>
        const USER_ID = "1344178421235978250"; // Use Flaxerrr's ID
        const highlight = document.querySelector('.cursor-highlight');

        // Mouse movement for the red highlight
        window.addEventListener('mousemove', (e) => {
            highlight.animate({
                left: `${e.clientX}px`,
                top: `${e.clientY}px`
            }, { duration: 600, fill: "forwards" });
        });

        async function updateLanyard() {
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
                const { data } = await response.json();
                
                // Update dynamic Spotify data
                const label = document.getElementById('status-label');
                const tName = document.getElementById('track-name');
                const aName = document.getElementById('artist-name');
                const art = document.getElementById('track-art');

                if (data.spotify) {
                    label.innerText = "now playing";
                    label.style.color = "#1DB954"; // Spotify Green
                    tName.innerText = data.spotify.track;
                    aName.innerText = data.spotify.artist;
                    art.style.backgroundImage = `url(${data.spotify.album_art_url})`;
                } else {
                    label.innerText = "offline";
                    label.style.color = "#ff4757";
                    tName.innerText = "Nothing playing";
                    aName.innerText = "Listening to silence";
                    art.style.backgroundImage = "none";
                    art.style.backgroundColor = "#222";
                }
            } catch (err) {
                console.error("Lanyard Error:", err);
            }
        }

        // Initialize and set interval
        updateLanyard();
        setInterval(updateLanyard, 5000);
    </script>
</body>
</html>
