<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flaxerrr | hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --card: #121212; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .cursor-highlight { width: 450px; height: 450px; background: radial-gradient(circle, rgba(255, 0, 0, 0.07) 0%, rgba(255, 0, 0, 0) 70%); border-radius: 50%; position: fixed; pointer-events: none; transform: translate(-50%, -50%); z-index: 0; }
        .main-card { width: 400px; background: var(--card); border-radius: 24px; border: 1px solid #1f1f1f; z-index: 1; position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        .banner { height: 100px; background: #1f2a5e; width: 100%; }
        .profile-content { padding: 0 25px 25px; text-align: center; margin-top: -50px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 6px solid var(--card); background: #222; object-fit: cover; }
        .status-dot { width: 22px; height: 22px; border-radius: 50%; border: 4px solid var(--card); position: absolute; bottom: 6px; right: 6px; background: #747f8d; }
        .username { font-size: 26px; font-weight: 800; margin: 15px 0 2px; }
        .handle { color: #666; font-size: 14px; margin-bottom: 20px; }
        .links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: #1a1a1a; padding: 12px; border-radius: 12px; text-decoration: none; color: #aaa; font-size: 13px; border: 1px solid #222; transition: 0.2s; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:hover { background: #222; color: #fff; transform: translateY(-2px); }
        .btn-full { grid-column: span 2; }
        .activity-card { margin: 20px 25px 25px; background: #0f0f0f; border-radius: 18px; padding: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid #1a1a1a; min-height: 90px; }
        .activity-art { width: 60px; height: 60px; border-radius: 12px; background: #222; background-size: cover; background-position: center; flex-shrink: 0; display: none; }
        .activity-label { font-size: 10px; font-weight: 900; color: #ff4757; text-transform: uppercase; margin-bottom: 4px; }
        .activity-name { font-size: 14px; font-weight: 700; color: #eee; }
        .activity-details { font-size: 12px; color: #777; }
    </style>
</head>
<body>
    <div class="cursor-highlight"></div>
    <div class="main-card">
        <div class="banner"></div>
        <div class="profile-content">
            <div style="position: relative; display: inline-block;">
                <img id="pfp" src="tanjiro-kamado-480x800-23027.jpg" class="avatar">
                <div id="status" class="status-dot"></div>
            </div>
            <div class="username" id="display-name">flaxerrr</div>
            <div class="handle" id="user-handle">@flaxerrr</div>
            <div class="links">
                <a href="https://discord.gg/jV7QfZutEu" class="btn"><i class="fa-brands fa-discord"></i> Discord</a>
                <a href="https://github.com/Doreoplayz102/" class="btn"><i class="fa-brands fa-github"></i> Github</a>
                <a href="#" class="btn"><i class="fa-solid fa-gamepad"></i> Roblox</a>
                <a href="https://github.com/Doreoplayz102?tab=repositories" class="btn"><i class="fa-solid fa-code"></i> Projects</a>
                <a href="https://www.tiktok.com/@flaxerrr?_r=1&_t=ZP-95VM8WcJlVO" class="btn btn-full"><i class="fa-brands fa-tiktok"></i> TikTok</a>
            </div>
        </div>
        <div class="activity-card">
            <div class="activity-art" id="act-art"></div>
            <div class="activity-info">
                <div class="activity-label" id="act-label">Activity</div>
                <div class="activity-name" id="act-name">Chilling</div>
                <div class="activity-details" id="act-detail">No active activity</div>
            </div>
        </div>
    </div>

    <script>
        const USER_ID = "1344178421235978250";
        const highlight = document.querySelector('.cursor-highlight');
        window.addEventListener('mousemove', (e) => { highlight.animate({ left: `${e.clientX}px`, top: `${e.clientY}px` }, { duration: 600, fill: "forwards" }); });

        async function updateLanyard() {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}?t=${Date.now()}`);
                const { data } = await res.json();
                
                // 1. Force PFP Refresh
                if (data.discord_user.avatar) {
                    const ext = data.discord_user.avatar.startsWith('a_') ? 'gif' : 'png';
                    const avatarUrl = `https://cdn.discordapp.com/avatars/${USER_ID}/${data.discord_user.avatar}.${ext}?size=256`;
                    document.getElementById('pfp').src = avatarUrl;
                }

                // 2. Status Color
                const colors = { online: '#43b581', idle: '#faa61a', dnd: '#f04747', offline: '#747f8d' };
                document.getElementById('status').style.backgroundColor = colors[data.discord_status] || '#747f8d';

                // 3. Activity Display
                const art = document.getElementById('act-art');
                const label = document.getElementById('act-label');
                const name = document.getElementById('act-name');
                const detail = document.getElementById('act-detail');

                if (data.listening_to_spotify && data.spotify) {
                    art.style.display = "block";
                    art.style.backgroundImage = `url(${data.spotify.album_art_url})`;
                    label.innerText = "Listening to Spotify";
                    name.innerText = data.spotify.track;
                    detail.innerText = `by ${data.spotify.artist}`;
                } else {
                    const game = data.activities.find(x => x.type === 0);
                    if (game) {
                        label.innerText = "Playing a Game";
                        name.innerText = game.name;
                        detail.innerText = game.details || "In-game";
                        
                        if (game.assets && game.assets.large_image) {
                            art.style.display = "block";
                            const img = game.assets.large_image;
                            const imgUrl = img.startsWith('mp:') ? `https://media.discordapp.net/${img.replace('mp:', '')}` : `https://cdn.discordapp.com/app-assets/${game.application_id}/${img}.png`;
                            art.style.backgroundImage = `url(${imgUrl})`;
                        } else {
                            art.style.display = "none";
                        }
                    } else {
                        art.style.display = "none";
                        label.innerText = "Activity";
                        name.innerText = "Chilling";
                        detail.innerText = "Not doing much";
                    }
                }
            } catch (e) { console.error("Lanyard Error"); }
        }
        setInterval(updateLanyard, 5000);
        updateLanyard();
    </script>
</body>
</html>
