<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flaxerrr | hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --bg: #0a0a0a; --card: #121212; --accent: #3498db; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        .cursor-highlight { width: 450px; height: 450px; background: radial-gradient(circle, rgba(255, 0, 0, 0.07) 0%, rgba(255, 0, 0, 0) 70%); border-radius: 50%; position: fixed; pointer-events: none; transform: translate(-50%, -50%); z-index: 0; }
        
        .main-card { width: 400px; background: var(--card); border-radius: 24px; border: 1px solid #1f1f1f; z-index: 1; position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        
        .banner { height: 100px; background: #1f2a5e; width: 100%; transition: background 0.8s ease; }
        
        .profile-content { padding: 0 25px 25px; text-align: center; margin-top: -50px; }
        .pfp-container { position: relative; display: inline-block; }
        
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 6px solid var(--card); background: #222; object-fit: cover; transition: opacity 0.5s ease; }
        .status-dot { width: 22px; height: 22px; border-radius: 50%; border: 4px solid var(--card); position: absolute; bottom: 6px; right: 6px; background: #747f8d; transition: background 0.3s; }
        
        .custom-status { background: #1a1a1a; padding: 6px 14px; border-radius: 12px; font-size: 12px; display: inline-block; margin-top: 12px; border: 1px solid #252525; color: #bbb; }
        
        .username { font-size: 26px; font-weight: 800; margin: 15px 0 2px; letter-spacing: -0.5px; }
        .handle { color: #666; font-size: 14px; margin-bottom: 12px; }
        .bio { font-size: 14px; color: #999; margin-bottom: 20px; line-height: 1.5; }
        
        /* Updated links grid for 5 buttons */
        .links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: #1a1a1a; padding: 12px; border-radius: 12px; text-decoration: none; color: #aaa; font-size: 13px; border: 1px solid #222; transition: 0.2s; text-align: center; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn i { font-size: 16px; }
        .btn:hover { background: #222; color: #fff; transform: translateY(-2px); border-color: #333; }
        .btn-full { grid-column: span 2; } /* Makes the TikTok button full width */

        .activity-card { margin: 20px 25px 25px; background: #0f0f0f; border-radius: 18px; padding: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid #1a1a1a; }
        .activity-art { width: 60px; height: 60px; border-radius: 12px; background: #222; background-size: cover; background-position: center; border: 1px solid #222; }
        .activity-info { text-align: left; overflow: hidden; }
        .activity-label { font-size: 10px; font-weight: 900; color: #ff4757; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
        .activity-name { font-size: 14px; font-weight: 700; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .activity-details { font-size: 12px; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <div class="cursor-highlight"></div>

    <div class="main-card">
        <div class="banner" id="banner"></div>
        
        <div class="profile-content">
            <div class="pfp-container">
                <img id="pfp" src="tanjiro-kamado-480x800-23027.jpg" class="avatar">
                <div id="status" class="status-dot"></div>
            </div>
            
            <div id="custom-status-wrap" style="display:none;">
                <div class="custom-status" id="custom-status"></div>
            </div>

            <div class="username" id="display-name">flaxerrr</div>
            <div class="handle" id="user-handle">@flaxerrr</div>
            <div class="bio" id="user-bio">tiktoker</div>

            <div class="links">
                <a href="#" class="btn"><i class="fa-brands fa-discord"></i> Discord</a>
                <a href="#" class="btn"><i class="fa-brands fa-github"></i> Github</a>
                <a href="#" class="btn"><i class="fa-solid fa-gamepad"></i> Roblox</a>
                <a href="#" class="btn"><i class="fa-solid fa-code"></i> Projects</a>
                <a href="#" class="btn btn-full"><i class="fa-brands fa-tiktok"></i> TikTok</a>
            </div>
        </div>

        <div class="activity-card">
            <div class="activity-art" id="act-art"></div>
            <div class="activity-info">
                <div class="activity-label" id="act-label">Activity</div>
                <div class="activity-name" id="act-name">Connecting...</div>
                <div class="activity-details" id="act-detail">Fetching Discord presence</div>
            </div>
        </div>
    </div>

    <script>
        const USER_ID = "1344178421235978250";
        const highlight = document.querySelector('.cursor-highlight');

        window.addEventListener('mousemove', (e) => {
            highlight.animate({ left: `${e.clientX}px`, top: `${e.clientY}px` }, { duration: 600, fill: "forwards" });
        });

        async function updateLanyard() {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${USER_ID}`);
                const { data } = await res.json();
                
                const user = data.discord_user;
                const pfp = document.getElementById('pfp');

                document.getElementById('display-name').innerText = user.global_name || user.username;
                document.getElementById('user-handle').innerText = `@${user.username}`;
                
                if (user.avatar) {
                    const ext = user.avatar.startsWith('a_') ? 'gif' : 'png';
                    pfp.src = `https://cdn.discordapp.com/avatars/${USER_ID}/${user.avatar}.${ext}?size=256`;
                }

                const colors = { online: '#43b581', idle: '#faa61a', dnd: '#f04747', offline: '#747f8d' };
                document.getElementById('status').style.backgroundColor = colors[data.discord_status] || '#747f8d';

                const custom = data.activities.find(a => a.type === 4);
                if (custom && custom.state) {
                    document.getElementById('custom-status-wrap').style.display = 'block';
                    document.getElementById('custom-status').innerText = custom.state;
                } else {
                    document.getElementById('custom-status-wrap').style.display = 'none';
                }

                const label = document.getElementById('act-label');
                const name = document.getElementById('act-name');
                const detail = document.getElementById('act-detail');
                const art = document.getElementById('act-art');

                if (data.spotify) {
                    label.innerText = "Listening to Spotify";
                    name.innerText = data.spotify.track;
                    detail.innerText = `by ${data.spotify.artist}`;
                    art.style.backgroundImage = `url(${data.spotify.album_art_url})`;
                } else {
                    const game = data.activities.find(a => a.type === 0);
                    if (game) {
                        label.innerText = "Playing a Game";
                        name.innerText = game.name;
                        detail.innerText = game.details || "In-game";
                        art.style.backgroundImage = game.assets ? `url(https://cdn.discordapp.com/app-assets/${game.application_id}/${game.assets.large_image}.png)` : 'none';
                    } else {
                        label.innerText = "Current Status";
                        name.innerText = "Not playing anything";
                        detail.innerText = "Chilling on Discord";
                        art.style.backgroundImage = 'none';
                    }
                }
            } catch (e) { console.error("Lanyard connection issue:", e); }
        }

        setInterval(updateLanyard, 5000);
        updateLanyard();
    </script>
</body>
</html>
